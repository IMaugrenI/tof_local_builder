services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: tof_local_builder_ollama
    restart: unless-stopped
    ports:
      - "${BUILDER_BIND_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ${OLLAMA_MODELS_PATH:-./data/ollama}:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  repo-bridge:
    build:
      context: ./services/repo_bridge
      dockerfile: Dockerfile
    container_name: tof_local_builder_repo_bridge
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${BUILDER_BIND_HOST:-127.0.0.1}:${REPO_BRIDGE_PORT:-8099}:8099"
    environment:
      SOURCE_ROOT: /workspace/source_repo_ro
      SANDBOX_ROOT: /workspace/builder_sandbox
      ALLOW_ORIGINS: ${ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ${SOURCE_REPO_PATH}:/workspace/source_repo_ro:ro
      - ${BUILDER_SANDBOX_PATH:-./sandbox}:/workspace/builder_sandbox
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8099/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  open-webui:
    image: ${OPENWEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    container_name: tof_local_builder_openwebui
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      repo-bridge:
        condition: service_healthy
    ports:
      - "${BUILDER_BIND_HOST:-127.0.0.1}:${OPENWEBUI_PORT:-3000}:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_NAME: tof_local_builder
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - ${OPENWEBUI_DATA_PATH:-./data/open-webui}:/app/backend/data
      - ${SOURCE_REPO_PATH}:/workspace/source_repo_ro:ro
      - ${BUILDER_SANDBOX_PATH:-./sandbox}:/workspace/builder_sandbox
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

networks:
  default:
    name: tof_local_builder_net
